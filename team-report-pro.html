<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队配置报告 · 专业版 - 采购谈判基因</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;font-family:-apple-system,sans-serif;padding:20px;max-width:600px;margin:0 auto;line-height:1.6}
.header{text-align:center;padding:40px 20px;border-bottom:2px solid #d4af37;margin-bottom:30px;background:rgba(15,32,39,0.5);border-radius:16px}
.title{font-size:26px;font-weight:800;color:#d4af37;margin-bottom:8px}
.subtitle{font-size:14px;color:#86868b;margin-bottom:16px}
.badge{display:inline-block;background:linear-gradient(135deg,#2c5364,#d4af37);color:#0f2027;padding:6px 16px;border-radius:980px;font-size:12px;font-weight:700}
.card{background:rgba(32,58,67,0.7);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(58,106,122,0.3);backdrop-filter:blur(10px)}
.card-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title.pro{color:#d4af37}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:rgba(44,83,100,0.3);padding:16px;border-radius:12px;text-align:center;border:1px solid rgba(58,106,122,0.3)}
.stat-num{font-size:24px;font-weight:800;color:#d4af37}
.stat-label{font-size:11px;color:#86868b;margin-top:4px}
.section{margin-bottom:28px}
.section-title{font-size:15px;font-weight:700;color:#d4af37;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(212,175,55,0.3);display:flex;align-items:center;gap:8px}
.dimension{margin-bottom:20px}
.dimension-name{font-size:13px;font-weight:600;color:#d4af37;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dimension-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bar-item{background:rgba(44,83,100,0.3);padding:12px;border-radius:8px;border:1px solid rgba(58,106,122,0.2)}
.bar-label{font-size:11px;color:#fff;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.bar-value{font-size:11px;color:#d4af37;font-weight:700}
.bar-bg{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#2c5364;border-radius:3px;transition:width 0.5s}
.bar-fill.majority{background:linear-gradient(90deg,#d4af37,#f0e68c)}
.advantage{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));border-left:4px solid #10b981;padding:16px;margin-bottom:14px;border-radius:0 12px 12px 0}
.advantage-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.advantage-desc{font-size:12px;color:#cccccc;line-height:1.7}
.advantage-impact{font-size:11px;color:#10b981;margin-top:8px;padding-top:8px;border-top:1px solid rgba(16,185,129,0.2);font-weight:600}
.risk{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));border-left:4px solid #f59e0b;padding:16px;margin-bottom:14px;border-radius:0 12px 12px 0}
.risk-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.risk-desc{font-size:12px;color:#cccccc;line-height:1.7}
.risk-alert{font-size:11px;color:#f59e0b;margin-top:10px;padding:10px;background:rgba(245,158,11,0.1);border-radius:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.risk-solution{font-size:11px;color:#fff;margin-top:8px;padding-top:8px;border-top:1px solid rgba(245,158,11,0.2)}
.pair{background:rgba(44,83,100,0.2);padding:16px;border-radius:12px;margin-bottom:14px;border:1px solid rgba(58,106,122,0.3)}
.pair-title{font-size:13px;font-weight:600;color:#d4af37;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pair-members{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.pair-member{text-align:center;flex:1}
.pair-avatar{font-size:32px;margin-bottom:6px}
.pair-name{font-size:12px;color:#fff;font-weight:600}
.pair-code{font-size:11px;color:#86868b}
.pair-reason{font-size:12px;color:#cccccc;line-height:1.7;background:rgba(0,0,0,0.2);padding:12px;border-radius:8px}
.member{display:flex;align-items:center;padding:14px;background:rgba(44,83,100,0.2);border-radius:12px;margin-bottom:10px;border:1px solid rgba(58,106,122,0.2);transition:all 0.3s}
.member:hover{background:rgba(44,83,100,0.3);border-color:#d4af37}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2c5364,#d4af37);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0f2027;margin-right:14px;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.member-code{font-size:11px;color:#86868b}
.member-status{font-size:12px;font-weight:600;color:#10b981;flex-shrink:0}
.course{background:linear-gradient(135deg,rgba(15,32,39,0.9),rgba(32,58,67,0.9));padding:18px;border-radius:12px;margin-bottom:14px;border:1px solid #d4af37;position:relative;overflow:hidden}
.course::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#d4af37,#f0e68c,#d4af37)}
.course-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
.course-teacher{font-size:12px;color:#86868b;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.course-match{font-size:11px;color:#10b981;margin-bottom:10px;padding:8px;background:rgba(16,185,129,0.1);border-radius:6px}
.recommendation{background:rgba(44,83,100,0.2);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid rgba(58,106,122,0.3)}
.recommendation-title{font-size:13px;font-weight:600;color:#d4af37;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.recommendation-content{font-size:12px;color:#cccccc;line-height:1.8}
.recommendation-content strong{color:#fff}
.tag-row{display:flex;flex-wrap:wrap;margin-bottom:12px}
.tag{display:inline-block;background:rgba(212,175,55,0.2);color:#d4af37;padding:4px 12px;border-radius:980px;font-size:11px;margin-right:6px;margin-bottom:6px;border:1px solid rgba(212,175,55,0.3)}
.score-box{background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05));border:2px solid #d4af37;padding:20px;border-radius:16px;text-align:center;margin-bottom:24px}
.score-label{font-size:12px;color:#86868b;margin-bottom:8px}
.score-num{font-size:48px;font-weight:800;color:#d4af37;line-height:1}
.score-desc{font-size:13px;color:#fff;margin-top:12px}
.action-plan{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);padding:16px;border-radius:12px;margin-bottom:16px}
.action-plan-title{font-size:13px;font-weight:600;color:#10b981;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.action-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.action-num{width:24px;height:24px;background:#10b981;color:#0f2027;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.action-text{font-size:12px;color:#cccccc;line-height:1.7;flex:1}
.footer{text-align:center;padding:30px 20px;color:#86868b;font-size:12px;border-top:1px solid rgba(58,106,122,0.3);margin-top:30px}
.btn{width:100%;background:linear-gradient(135deg,#d4af37,#f0e68c);color:#0f2027;border:none;padding:18px;border-radius:980px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;box-shadow:0 4px 20px rgba(212,175,55,0.4);transition:all 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.5)}
.btn-secondary{background:rgba(44,83,100,0.6);color:#fff;border:2px solid #3a6a7a;box-shadow:none}
.insight-box{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05));border-left:4px solid #3b82f6;padding:16px;border-radius:0 12px 12px 0;margin-bottom:16px}
.insight-title{font-size:13px;font-weight:600;color:#3b82f6;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.insight-content{font-size:12px;color:#cccccc;line-height:1.7}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;">
<button onclick="history.back()" style="background:transparent;border:none;color:#d4af37;font-size:24px;cursor:pointer;padding:0;">←</button>
<div class="badge">专业版报告</div>
<div style="width:24px;"></div>
</div>
<div class="title" style="margin-top:12px;">📊 团队配置报告</div>
<div class="subtitle">采购谈判基因 · 深度分析版</div>
<div style="margin-top:16px;font-size:12px;color:#86868b;">报告生成时间：<span id="report-generated">--</span></div>
</div>

<!-- 效能评分 -->
<div class="score-box">
<div class="score-label">团队综合效能评分</div>
<div class="score-num" id="score-num">--</div>
<div class="score-desc" id="score-desc">--</div>
</div>

<!-- 团队概况 -->
<div class="card">
<div class="card-title pro">👥 团队概况</div>
<div class="tag-row">
<span class="tag" id="tag-team-size">--</span>
<span class="tag" id="tag-tested-pct">--</span>
<span class="tag" id="tag-team-type-label">--</span>
</div>
<div class="stats" style="margin-top:16px;">
<div class="stat"><div class="stat-num" id="stat-total">--</div><div class="stat-label">总人数</div></div>
<div class="stat"><div class="stat-num" id="stat-tested">--</div><div class="stat-label">已测试</div></div>
<div class="stat"><div class="stat-num" id="stat-pending">--</div><div class="stat-label">待测试</div></div>
</div>
<div style="background:rgba(44,83,100,0.2);padding:16px;border-radius:12px;margin-top:16px;">
<div style="font-size:12px;color:#86868b;margin-bottom:8px;">团队类型判定</div>
<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;" id="team-type">--</div>
<div style="font-size:12px;color:#cccccc;line-height:1.7;" id="team-type-desc">--</div>
</div>
</div>

<!-- 四维度深度分析 -->
<div class="section">
<div class="section-title">📐 四维度深度分析</div>
<div id="dimension-bars-container"></div>
</div>

<!-- 团队核心优势 -->
<div class="card">
<div class="card-title pro">✅ 团队核心优势</div>
<div id="advantages-container"></div>
</div>

<!-- 潜在风险与改进方案 -->
<div class="card">
<div class="card-title pro">⚠️ 潜在风险与改进方案</div>
<div id="risks-container"></div>
</div>

<!-- 最佳拍档配对建议 -->
<div class="card">
<div class="card-title pro">🤝 最佳拍档配对建议</div>
<div id="pairs-container"></div>
</div>

<!-- 未配对成员独立建议 v2.1 新增 -->
<div class="card" id="unpaired-section" style="display:none;">
<div class="card-title pro">💡 独立角色建议</div>
<div id="unpaired-container"></div>
</div>

<!-- 团队成员画像 -->
<div class="card">
<div class="card-title pro">📋 团队成员画像</div>
<div id="members-container"></div>
</div>

<!-- 发展建议与行动计划 -->
<div class="card">
<div class="card-title pro">💡 发展建议与行动计划</div>

<div class="recommendation" id="hiring-recommendation"></div>
<div class="recommendation" id="training-recommendation"></div>

<div class="action-plan">
<div class="action-plan-title">🎯 90 天行动计划</div>
<div id="action-plan-container"></div>
</div>

<div class="recommendation" id="project-config-container"></div>
</div>

<!-- 推荐课程 -->
<div class="card">
<div class="card-title pro">🎓 推荐课程 · 针对性提升</div>
<div id="courses-container"></div>
</div>

<!-- Footer -->
<div class="footer">
<div style="font-size:14px;color:#fff;margin-bottom:8px;">📄 本报告由 采购谈判基因 专业版生成</div>
<div style="margin-bottom:16px;">完整报告 · 深度洞察 · 可执行建议 · 持续追踪</div>
<button class="btn" onclick="alert('🎉 感谢使用！\n\n📥 PDF 下载功能开发中...\n\n报告已自动保存，可随时查看。')">📥 下载 PDF 报告</button>
<button class="btn btn-secondary" onclick="alert('📊 团队追踪功能开发中...\n\n30 天后可重新测试，对比团队变化。')" style="margin-top:12px;">📈 30 天后重新评估</button>
<button class="btn btn-secondary" onclick="history.back()" style="margin-top:12px;background:linear-gradient(135deg,#2c5364,#d4af37);color:#0f2027;border:none;">← 返回</button>
<div style="margin-top:24px;font-size:11px;color:#86868b;">© 2026 采购谈判基因 · 优链学堂</div>
</div>

<!-- 数据文件 -->
<script src="team-report-data.js"></script>
<!-- 计算与渲染引擎 -->
<script src="team-report.js"></script>
<!-- 初始化 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof window.renderTeamReport === 'function') {
    window.renderTeamReport();
  }
});
</script>
</body>
</html>
